name: if-success-spike
on: workflow_dispatch
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: fail
        run: exit 1
      - name: wrapped-if
        if: ${{ true }}
        run: echo "WRAPPED RAN AFTER FAILURE"
      - name: bare-if
        if: true
        run: echo "BARE RAN AFTER FAILURE"
